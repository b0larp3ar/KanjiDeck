<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review</title>
</head>
<body>
    <div id="word">Word: {{word}}</div> <!--Word-->

    <div id="meaning"></div> <!--Meaning-->

    <button onclick="showAnswer()">Show answer</button> <!--Show answer button-->

    <button onclick="location.reload()">Next card</button> <!--Next card button-->

    <!--Script-->
    <script>
        function showAnswer(){
            document.getElementById("meaning").innerHTML="Meaning: {{meaning}}";
        }
    </script>
</body>
</html>
