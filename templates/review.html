<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review</title>
    <link rel="stylesheet" href="{{url_for('static', filename='review_style.css')}}">
</head>
<body>
    <!--Card-->
    <div class="card">
        <div class="level-badge">{{level}}</div> <!--Level badge-->

        <a href="/" class="home">Home</a> <!--Home button-->

        <div id="original">{{original}}</div> <!--Original-->

        <div id="furigana"></div> <!--Furigana-->
        <div id="english"></div> <!--English-->

        <button onclick="showAnswer()" class="flashcard-buttons">Show answer</button> <!--Show answer button-->

        <button onclick="location.reload()" class="flashcard-buttons">Next card</button> <!--Next card button-->
    </div>

    <!--Script-->
    <script>
        function showAnswer(){
            document.getElementById("furigana").innerHTML="{{furigana}}";
            document.getElementById("english").innerHTML="{{english}}";
        }
    </script>
</body>
</html>
