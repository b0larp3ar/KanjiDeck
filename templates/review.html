<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review</title>
    <link rel="stylesheet" href="{{url_for('static', filename='review_style.css')}}">
</head>
<body>
    <div class="card">
        <div class="level-badge">{{level}}</div>

        <a href="/" class="home">Home</a>

        <div id="word">{{word}}</div> <!--Word-->

        <div id="meaning"></div> <!--Meaning-->

        <button onclick="showAnswer()" class="flashcard-buttons">Show answer</button> <!--Show answer button-->

        <button onclick="location.reload()" class="flashcard-buttons">Next card</button> <!--Next card button-->
    </div>

    <!--Script-->
    <script>
        function showAnswer(){
            document.getElementById("meaning").innerHTML="{{meaning}}";
        }
    </script>
</body>
</html>
