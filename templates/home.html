<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="{{url_for('static', filename='home_style.css')}}">
</head>
<body>
    <div class="container">
        <!--Side bar-->
        <button id="side-button" onclick="sideBarToggle()">☰</button>

        <div id="sidebar" class="sidebar">
            <a href="/">Option 1</a>
            <a href="/">Option 2</a>
            <a href="/">Option 3</a>
            <a href="/">Option 4</a>
        </div>

        <!--Title-->
        <div class="title">
            <h1>KanjiDeck</h1>
        </div>

        <!--Select JLPT Levels-->
        <div class="levels">
            <a href="/review/N5"><button class="level-button">N5</button></a>
            <a href="/review/N4"><button class="level-button">N4</button></a>
            <a href="/review/N3"><button class="level-button">N3</button></a>
            <a href="/review/N2"><button class="level-button">N2</button></a>
            <a href="/review/N1"><button class="level-button">N1</button></a>
        </div>
    </div>

    <!--Scripts-->
    <script>
        const sidebar=document.getElementById("sidebar");
        const sidebutton=document.getElementById("side-button");
        function sideBarToggle(){
            sidebar.classList.toggle("open")
            sidebutton.classList.toggle("open")
        }
    </script>
</body>
</html>
